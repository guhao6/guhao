<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}在线学习平台{% endblock %}</title>
    <!-- 引入Bootstrap和jQuery CDN -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <!-- 自定义样式 -->
    <style>
        .header { background: #337ab7; color: white; padding: 20px 0; }
        .nav-bar { margin: 20px 0; }
        .footer { margin-top: 50px; padding: 20px 0; border-top: 1px solid #eee; text-align: center; }
        .course-item { margin-bottom: 30px; }
        .banner-item { height: 400px; object-fit: cover; }
        .video-player { width: 100%; height: 500px; border: none; }
    </style>
    {% block css %}{% endblock %}
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header text-center">
            <h1>在线学习平台</h1>
        </div>

        <!-- 导航栏 -->
        <nav class="navbar navbar-default nav-bar">
            <div class="container-fluid">
                <div class="navbar-header">
                    <a class="navbar-brand" href="/">首页</a>
                </div>
                <div class="collapse navbar-collapse">
                    <ul class="nav navbar-nav">
                        <li><a href="/courses/list/">课程列表</a></li>
                        <li><a href="/orgs/list/">机构列表</a></li>
                        <li><a href="/orgs/teacher/list/">讲师列表</a></li>
                        <li><a href="/admin/" target="_blank">后台管理</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 内容区 -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <!-- 底部 -->
        <div class="footer">
            <p>============自制   在线   学习   网站============</p>
        </div>
    </div>
    {% block js %}{% endblock %}
</body>
</html>
